name: Deploy to dev theme

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme to dev
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store ${{ secrets.SHOPIFY_STORE }} \
            --theme ${{ secrets.DEV_THEME_ID }} \
            --allow-live \
            --nodelete

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://${{ secrets.SHOPIFY_STORE }}?preview_theme_id=${{ secrets.DEV_THEME_ID }}`;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:dev`
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: `🛍️ **Dev theme preview:** [Click to preview](${previewUrl})`
              });
            }
